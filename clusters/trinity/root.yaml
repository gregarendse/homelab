apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trinity-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gregarendse/homelab.git
    targetRevision: master
    path: clusters/trinity/rendered
    directory:
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  # syncPolicy:
  #   automated:
  #     prune: true
  #     selfHeal: true
