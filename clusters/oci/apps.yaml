  #  Managed by infrastructure/kubernetes/cert-manager.tf
  - name: cert-manager
    type: helm
    namespace: security
    helm:
      kind: remote
      repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.18.2
      releaseName: cert-manager

