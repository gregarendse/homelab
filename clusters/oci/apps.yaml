apps:
  # In-repo "server" Helm chart releases (values live under applications/<app>/values.yaml)
  - name: echo
    type: helm
    namespace: echo
    helm:
      kind: path
      path: server
      releaseName: echo
      valueFiles:
        - applications/echo/values.yaml

