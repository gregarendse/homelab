# hermes-secrets.example.yaml
#
# Template for the Kubernetes Secret consumed by the Hermes Agent deployment.
# All keys present in this Secret are injected as environment variables into
# the hermes container via envFrom.secretRef — add or remove keys freely.
#
# Usage:
#   1. Copy this file to hermes-secrets.yaml (git-ignored).
#   2. Fill in your values.
#   3. Apply:  kubectl apply -f hermes-secrets.yaml
#
# DO NOT commit a filled-in copy of this file.

apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
  namespace: hermes
type: Opaque
stringData:

  # ── Required ────────────────────────────────────────────────────────────────
  # API server key — gates the OpenAI-compatible gateway API and dashboard.
  # Generate with:  openssl rand -hex 32
  API_SERVER_KEY: "changeme"

  # ── Variant A: Local Ollama ──────────────────────────────────────────────────
  # No additional keys required when using config-ollama.yaml.

  # ── Variant B: Cloud provider ───────────────────────────────────────────────
  # Uncomment the key that matches the provider block in config-cloud.yaml.

  # OPENAI_API_KEY: "sk-..."
  # GEMINI_API_KEY: "AIza..."

  # ── Optional: messaging platform gateway tokens ──────────────────────────────
  # Add whichever platforms you want the gateway to connect to.

  # TELEGRAM_BOT_TOKEN: ""
  # DISCORD_BOT_TOKEN: ""
  # SLACK_BOT_TOKEN: ""
  # SLACK_APP_TOKEN: ""
  # WHATSAPP_API_KEY: ""
