# mktxp credentials Secret for the Mikrotik RouterOS API user.
#
# This Secret is intentionally NOT managed by kubenix/ArgoCD and is NEVER
# committed, so the router password never lands in Git (matching the project
# convention for sensitive values — see AGENTS.md). The mktxp Deployment projects
# credentials.yaml into /etc/mktxp alongside the ConfigMap-provided .conf files.
#
# mktxp.conf references it via:
#     credentials_file = /etc/mktxp/credentials.yaml
#
# Create it manually (preferred):
#
#   kubectl -n monitoring create secret generic mktxp-credentials \
#     --from-literal=credentials.yaml='username: mktxp_user
#   password: <strong-password>'
#
# Or apply a filled-in copy of this manifest (do NOT commit the filled copy).
#
# To rotate the password later, update the Secret and restart mktxp:
#   kubectl -n monitoring rollout restart deploy/mktxp

apiVersion: v1
kind: Secret
metadata:
  name: mktxp-credentials
  namespace: monitoring
type: Opaque
stringData:
  # mktxp credentials_file format (YAML): both keys are required.
  credentials.yaml: |
    username: mktxp_user
    password: <strong-password>
