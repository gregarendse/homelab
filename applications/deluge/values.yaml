image:
  repository: linuxserver/deluge
  # Overrides the image tag whose default is the chart appVersion.
  # tag: "develop"
  pullPolicy: Always

volumes:
  config:
    source: "/mnt/data/deluge/config"
    dest: "/config"

  downloads:
    source: /red/downloads
    dest: /downloads

environment:
  - name: PUID
    value: "116"
  - name: "PGID"
    value: "119"
  - name: TZ
    value: Africa/Johannaesburg

ports:
  http:
    target: 8112
    protocol: TCP

  torrent-tcp:
    target: 6881
    protocol: TCP

  torrent-udp:
    target: 6881
    protocol: UDP

ingress:
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: deluge.arendse.nom.za
      tls: true
      path: /
      service:
        name: http
