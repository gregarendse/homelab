loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: s3
    s3:
      # OCI Object Storage S3 compatibility
      # Replace <namespace> and <region> with your OCI values
      endpoint: https://<namespace>.compat.objectstorage.<region>.oraclecloud.com
      bucketnames: homelab-loki-logs
      s3ForcePathStyle: true
      access_key_id:
        valueFrom:
          secretKeyRef:
            name: loki-s3-secret
            key: access_key
      secret_access_key:
        valueFrom:
          secretKeyRef:
            name: loki-s3-secret
            key: secret_key

  # Retention guardrails
  limits_config:
    retention_period: 168h # 7 days

  compactor:
    working_directory: /data/retention
    compaction_interval: 10m
    retention_enabled: true
    retention_delete_delay: 2h
    retention_delete_worker_count: 150

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: longhorn
    size: 5Gi

# OCI S3 credentials need to be injected via a secret
# Example secret:
# apiVersion: v1
# kind: Secret
# metadata:
#   name: loki-s3-secret
#   namespace: loki
# stringData:
#   access_key: <OCI_ACCESS_KEY>
#   secret_key: <OCI_SECRET_KEY>
