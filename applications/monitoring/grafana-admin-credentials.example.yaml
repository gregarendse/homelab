# Grafana admin credentials for the kube-prometheus-stack release.
#
# This Secret is intentionally NOT managed by Helm/Terraform, so the password
# never lands in Helm's server-side-apply field ownership (which previously
# caused "conflict with kubectl-edit" upgrade failures) or in Git.
# applications/monitoring/values.yaml references it by name only via
# grafana.admin.existingSecret.
#
# Usage:
#   1. Copy this file to grafana-admin-credentials.yaml (git-ignored) OR just
#      create the Secret directly with kubectl (preferred):
#
#        kubectl -n monitoring create secret generic grafana-admin-credentials \
#          --from-literal=admin-user=admin \
#          --from-literal=admin-password='<strong-password>'
#
#   2. Deploy/upgrade the monitoring release. Grafana reads the credentials from
#      this Secret on startup.
#
#   3. To rotate the password later, update the Secret and restart Grafana:
#        kubectl -n monitoring rollout restart deploy/monitoring-grafana
#
# DO NOT commit a filled-in copy.

apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: <secret>
