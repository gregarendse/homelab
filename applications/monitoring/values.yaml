prometheus:
  prometheusSpec:
    retention: 7d
    retentionSize: 10GB
    storageSpec:
      volumeClaimTemplate:
        metadata:
          labels:
            # Longhorn backup cycle: Saturday (staggered to spread B2 traffic)
            recurring-job-group.longhorn.io/saturday-backup: enabled
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 15Gi

grafana:
  # Admin credentials are read from an externally-managed Secret rather than
  # being templated by the chart. This keeps the password out of Helm's
  # server-side-apply ownership (avoiding conflicts with manual edits) and out
  # of values.yaml/Git. Create the Secret out-of-band before deploying:
  #
  #   kubectl -n monitoring create secret generic grafana-admin-credentials \
  #     --from-literal=admin-user=admin \
  #     --from-literal=admin-password='<strong-password>'
  #
  # See applications/monitoring/README.md.
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    storageClassName: longhorn
    accessModes: ["ReadWriteOnce"]
    size: 2Gi
    # Longhorn backup cycle: Saturday (staggered to spread B2 traffic)
    extraPvcLabels:
      recurring-job-group.longhorn.io/saturday-backup: enabled
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - grafana.arendse.nom.za
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.arendse.nom.za

  # client_id / client_secret are injected as env vars from this Secret and
  # auto-mapped by Grafana to [auth.generic_oauth] (GF_AUTH_GENERIC_OAUTH_*).
  # The Secret is created out-of-band — see applications/monitoring/README.md.
  envFromSecret: grafana-auth0
  grafana.ini:
    server:
      root_url: https://grafana.arendse.nom.za

    auth:
      # Disable basic auth login form — Auth0 only
      disable_login_form: true # set true once you've confirmed OAuth works
      oauth_auto_login: true # set true once confirmed — skips the Grafana login page
    auth.generic_oauth:
      enabled: true
      name: Auth0
      icon: signin
      # offline_access is required for refresh tokens (use_refresh_token below).
      # Also enable "Allow Offline Access" on the Auth0 API.
      scopes: openid profile email offline_access
      auth_url: https://arendse.uk.auth0.com/authorize
      token_url: https://arendse.uk.auth0.com/oauth/token
      api_url: https://arendse.uk.auth0.com/userinfo
      use_pkce: true
      use_refresh_token: true
      # client_id / client_secret come from the grafana-auth0 Secret via
      # envFromSecret (GF_AUTH_GENERIC_OAUTH_CLIENT_ID / _CLIENT_SECRET).
      # Map Auth0 roles — adjust to match claims you set up in Auth0
      role_attribute_path: contains(email, 'greg.arendse@gmail.com') && 'Admin' || 'Viewer'

  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.loki.svc.cluster.local:3100
      version: 1
      isDefault: false
