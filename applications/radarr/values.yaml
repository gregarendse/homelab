---
image:
  repository: lscr.io/linuxserver/radarr
  # Overrides the image tag whose default is the chart appVersion.
  pullPolicy: Always

volumes:
  config:
    source: "/mnt/data/radarr/config"
    dest: "/config"

  downloads:
    source: "/red/downloads"
    dest: "/red/downloads"

  blackhole:
    source: "/red/blackhole"
    dest: "/red/blackhole"

  mega-blackhole:
    source: "/red/mega/blackhole"
    dest: "/red/mega/blackhole"

  movies:
    source: "/red/Movies"
    dest: "/movies"

environment:
  - name: PUID
    value: "120"
  - name: "PGID"
    value: "119"
  - name: TZ
    value: Africa/Johannaesburg

ports:
  http:
    target: 7878
    protocol: TCP

vpa:
  updateMode: InPlaceOrRecreate

ingress:
  annotations:
    kubernetes.io/tls-acme: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: radarr.arendse.nom.za
      tls: true
      path: /
      service:
        name: http
